# ══════════════════════════════════════════════════════════════
# values.example.yaml — Agent IA Kubernetes Monitoring
# Copier ce fichier vers values.yaml et remplir vos valeurs
# NE PAS commiter values.yaml sur GitHub !
# ══════════════════════════════════════════════════════════════

# ── Image Docker ──────────────────────────────────────────────
image:
  repository: ghcr.io/VOTRE_USERNAME/agent-ia
  tag: latest
  pullPolicy: Always

# ── Service ───────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 5000

# ── Replicas ──────────────────────────────────────────────────
replicaCount: 1

# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# ── Configuration (sans secrets) ──────────────────────────────
config:
  prometheusUrl: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"
  lokiUrl:       "http://loki-gateway.monitoring:80"
  minioEndpoint: "minio.apps:9000"
  minioBucket:   "incident-reports"
  minioSecure:   "false"
  dedupWindow:   "1800"
  gmailHost:     "smtp.gmail.com"
  gmailPort:     "587"
  emailFrom:     "votre.email@gmail.com"
  emailTo:       "destinataire@gmail.com"

# ── Secrets — Remplacer par vos vraies valeurs ─────────────────
# NE PAS commiter values.yaml avec les vraies valeurs !
secrets:
  githubToken:    "VOTRE_GITHUB_TOKEN"
  gmailUsername:  "VOTRE_EMAIL@gmail.com"
  gmailPassword:  "VOTRE_GMAIL_APP_PASSWORD"
  minioAccessKey: "VOTRE_MINIO_ACCESS_KEY"
  minioSecretKey: "VOTRE_MINIO_SECRET_KEY"