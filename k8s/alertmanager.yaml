apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  route:
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 1m
    repeatInterval: 5m
    receiver: 'webhook-alert'
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: 'webhook-alert'
      - matchers:
          - name: severity
            value: warning
        receiver: 'webhook-alert'
  receivers:
    - name: 'webhook-alert'
      webhookConfigs:
        - url: 'http://host.docker.internal:5000/webhook/alert'
          sendResolved: true